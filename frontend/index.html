<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星界神话 - 谐波共振星座</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Microsoft YaHei', sans-serif;
      }
      #gameCanvas {
        display: block;
        cursor: crosshair;
      }
      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        color: #fff;
      }
      .hud {
        position: absolute;
        padding: 16px 24px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(100, 150, 255, 0.3);
        border-radius: 12px;
        font-size: 14px;
      }
      #level-info {
        top: 20px;
        left: 20px;
      }
      #challenge-info {
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        display: none;
      }
      #challenge-info.active {
        display: block;
      }
      #challenge-info .timer {
        font-size: 24px;
        font-weight: bold;
        color: #ffd700;
      }
      #challenge-info .timer.warning {
        color: #ff6b6b;
        animation: pulse 0.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      #challenge-info .errors {
        margin-top: 6px;
        color: #ff6b6b;
      }
      #challenge-info .rules {
        margin-top: 6px;
        font-size: 12px;
        color: #a0c4ff;
      }
      #hint-box {
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        max-width: 600px;
      }
      #hint-box .title {
        font-size: 18px;
        font-weight: bold;
        color: #a0c4ff;
        margin-bottom: 8px;
      }
      #progress-bar {
        top: 20px;
        right: 20px;
        min-width: 180px;
      }
      .progress-bar-container {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 4px;
        transition: width 0.5s ease;
      }
      .btn {
        pointer-events: auto;
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
        margin: 0 5px;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      .btn-secondary {
        background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
      }
      .btn-gold {
        background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        color: #2d3748;
        font-weight: bold;
      }
      .btn-danger {
        background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
      }
      #complete-modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        background: rgba(10, 15, 40, 0.95);
        border: 2px solid rgba(160, 196, 255, 0.5);
        border-radius: 20px;
        padding: 40px 60px;
        text-align: center;
        pointer-events: auto;
        transition: transform 0.5s ease;
      }
      #complete-modal.show {
        transform: translate(-50%, -50%) scale(1);
      }
      #complete-modal h2 {
        font-size: 32px;
        color: #ffd700;
        margin-bottom: 16px;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }
      #complete-modal p {
        font-size: 16px;
        color: #a0c4ff;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      #buttons-container {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: auto;
      }
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
        pointer-events: auto;
      }
      .overlay.show {
        display: flex;
      }
      .modal {
        background: rgba(10, 15, 40, 0.95);
        border: 2px solid rgba(160, 196, 255, 0.4);
        border-radius: 24px;
        padding: 48px 56px;
        max-width: 600px;
        width: 90%;
        text-align: center;
      }
      .modal h1 {
        font-size: 36px;
        color: #a0c4ff;
        margin-bottom: 12px;
        text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
      }
      .modal h2 {
        font-size: 24px;
        color: #ffd700;
        margin-bottom: 24px;
      }
      .modal p {
        font-size: 14px;
        color: #a0c4ff;
        margin-bottom: 16px;
        line-height: 1.8;
      }
      .modal-subtitle {
        font-size: 14px;
        color: #888;
        margin-bottom: 32px;
      }
      .level-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin: 24px 0;
      }
      .level-card {
        padding: 20px 16px;
        background: rgba(100, 150, 255, 0.1);
        border: 2px solid rgba(100, 150, 255, 0.3);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.3s;
      }
      .level-card:hover {
        background: rgba(100, 150, 255, 0.2);
        border-color: rgba(100, 150, 255, 0.6);
        transform: translateY(-4px);
      }
      .level-card.selected {
        background: rgba(255, 215, 0, 0.15);
        border-color: #ffd700;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      }
      .level-card .level-num {
        font-size: 28px;
        font-weight: bold;
        color: #ffd700;
        margin-bottom: 8px;
      }
      .level-card .level-name {
        font-size: 16px;
        color: #a0c4ff;
        margin-bottom: 4px;
      }
      .level-card .creature {
        font-size: 12px;
        color: #888;
      }
      .mode-toggle {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 20px 0;
      }
      .mode-btn {
        flex: 1;
        padding: 14px 20px;
        background: rgba(100, 150, 255, 0.1);
        border: 2px solid rgba(100, 150, 255, 0.3);
        border-radius: 12px;
        color: #a0c4ff;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 14px;
      }
      .mode-btn:hover {
        background: rgba(100, 150, 255, 0.2);
      }
      .mode-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-color: transparent;
        color: white;
        font-weight: bold;
      }
      .rules-section {
        text-align: left;
        margin: 24px 0;
        padding: 20px;
        background: rgba(100, 150, 255, 0.08);
        border-radius: 12px;
        border: 1px solid rgba(100, 150, 255, 0.2);
      }
      .rules-section h3 {
        font-size: 16px;
        color: #ffd700;
        margin-bottom: 16px;
        text-align: center;
      }
      .rule-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .rule-item:last-child {
        border-bottom: none;
      }
      .rule-label {
        color: #a0c4ff;
        font-size: 14px;
      }
      .rule-label .desc {
        display: block;
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      .rule-control {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .rule-control select,
      .rule-control input[type="number"] {
        background: rgba(10, 15, 40, 0.8);
        border: 1px solid rgba(100, 150, 255, 0.3);
        border-radius: 8px;
        padding: 6px 12px;
        color: #a0c4ff;
        font-size: 14px;
        outline: none;
      }
      .rule-control select:focus,
      .rule-control input[type="number"]:focus {
        border-color: #667eea;
      }
      .switch {
        position: relative;
        width: 50px;
        height: 26px;
        background: rgba(100, 150, 255, 0.2);
        border-radius: 13px;
        cursor: pointer;
        transition: background 0.3s;
      }
      .switch.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .switch-knob {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        transition: transform 0.3s;
      }
      .switch.active .switch-knob {
        transform: translateX(24px);
      }
      .records-list {
        max-height: 300px;
        overflow-y: auto;
        margin: 16px 0;
        text-align: left;
      }
      .record-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: rgba(100, 150, 255, 0.08);
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid rgba(100, 150, 255, 0.15);
      }
      .record-item.gold {
        background: rgba(255, 215, 0, 0.1);
        border-color: rgba(255, 215, 0, 0.4);
      }
      .record-rank {
        font-size: 18px;
        font-weight: bold;
        color: #ffd700;
        width: 30px;
      }
      .record-info {
        flex: 1;
        margin: 0 12px;
      }
      .record-score {
        font-size: 16px;
        font-weight: bold;
        color: #a0c4ff;
      }
      .record-meta {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      .record-status {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 4px;
      }
      .record-status.success {
        background: rgba(100, 255, 150, 0.15);
        color: #64ff96;
      }
      .record-status.fail {
        background: rgba(255, 100, 100, 0.15);
        color: #ff6464;
      }
      .empty-records {
        color: #888;
        font-size: 14px;
        padding: 40px 0;
      }
      .challenge-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin: 24px 0;
      }
      .stat-item {
        padding: 16px;
        background: rgba(100, 150, 255, 0.1);
        border-radius: 12px;
        text-align: center;
      }
      .stat-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
      }
      .stat-value {
        font-size: 24px;
        font-weight: bold;
        color: #ffd700;
      }
      .stat-value.fail {
        color: #ff6b6b;
      }
      .btn-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
      <div class="hud" id="level-info">
        <div>第 <span id="level-num">1</span> 关</div>
        <div style="margin-top: 6px; color: #a0c4ff;">神话生物: <span id="creature-name">未知</span></div>
        <div style="margin-top: 6px; font-size: 12px; color: #888;">已连接: <span id="connected-count">0</span> / <span id="total-count">0</span></div>
      </div>
      <div class="hud" id="challenge-info">
        <div class="timer" id="challenge-timer">--</div>
        <div class="errors" id="challenge-errors">错误: 0</div>
        <div class="rules" id="challenge-rules"></div>
      </div>
      <div class="hud" id="progress-bar">
        <div>星座完成度</div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="hud" id="hint-box">
        <div class="title" id="hint-title">观察星空</div>
        <div id="hint-text">寻找闪烁频率成倍数关系的恒星，用鼠标拖动连接它们</div>
      </div>
      <div id="buttons-container">
        <button class="btn" id="btn-undo">撤销连线</button>
        <button class="btn" id="btn-reset">重置本关</button>
        <button class="btn" id="btn-hint">显示频率</button>
        <button class="btn btn-secondary" id="btn-menu">返回菜单</button>
      </div>
      <div id="complete-modal">
        <h2 id="modal-title">✨ 星座完成 ✨</h2>
        <p id="modal-desc"></p>
        <button class="btn" id="btn-next">下一关</button>
      </div>
    </div>

    <div class="overlay" id="menu-overlay">
      <div class="modal">
        <h1>星界神话</h1>
        <p class="modal-subtitle">谐波共振星座连接</p>
        <p>寻找闪烁频率成倍数关系的恒星，从一颗星拖动到另一颗星连接它们。当所有星脉都被连接，神话生物便会显现。</p>

        <div class="mode-toggle">
          <div class="mode-btn active" data-mode="normal">普通模式</div>
          <div class="mode-btn" data-mode="challenge">挑战模式</div>
        </div>

        <div id="levels-section">
          <h2 style="font-size: 18px; margin-bottom: 8px;">选择关卡</h2>
          <div class="level-grid" id="level-grid"></div>
        </div>

        <div id="rules-section" class="rules-section" style="display: none;">
          <h3>挑战规则</h3>
          <div class="rule-item">
            <div class="rule-label">
              限时挑战
              <span class="desc">在规定时间内完成星座连接</span>
            </div>
            <div class="rule-control">
              <div class="switch" id="switch-timelimit">
                <div class="switch-knob"></div>
              </div>
              <select id="select-timelimit" disabled>
                <option value="60">60 秒</option>
                <option value="90">90 秒</option>
                <option value="120" selected>120 秒</option>
                <option value="180">180 秒</option>
              </select>
            </div>
          </div>
          <div class="rule-item">
            <div class="rule-label">
              禁用频率显示
              <span class="desc">无法查看恒星的闪烁频率数值</span>
            </div>
            <div class="rule-control">
              <div class="switch" id="switch-freq">
                <div class="switch-knob"></div>
              </div>
            </div>
          </div>
          <div class="rule-item">
            <div class="rule-label">
              最多错误次数
              <span class="desc">超过限制次数则挑战失败</span>
            </div>
            <div class="rule-control">
              <div class="switch" id="switch-maxerrors">
                <div class="switch-knob"></div>
              </div>
              <select id="select-maxerrors" disabled>
                <option value="1">1 次</option>
                <option value="3" selected>3 次</option>
                <option value="5">5 次</option>
                <option value="10">10 次</option>
              </select>
            </div>
          </div>
        </div>

        <div id="records-section" style="display: none;">
          <h2 style="font-size: 18px; margin-bottom: 8px;">挑战成绩榜</h2>
          <div class="records-list" id="records-list"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-gold" id="btn-start">开始游戏</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="challenge-result-overlay">
      <div class="modal">
        <h1 id="challenge-result-title">挑战成功</h1>
        <p class="modal-subtitle" id="challenge-result-subtitle"></p>
        <div class="challenge-stats">
          <div class="stat-item">
            <div class="stat-label">得分</div>
            <div class="stat-value" id="result-score">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">用时</div>
            <div class="stat-value" id="result-time">0s</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">错误</div>
            <div class="stat-value" id="result-errors">0</div>
          </div>
        </div>
        <div id="result-new-record" style="display: none; color: #ffd700; font-size: 18px; margin-bottom: 16px;">
          🎉 新纪录！
        </div>
        <div class="btn-row">
          <button class="btn btn-gold" id="btn-retry-challenge">再试一次</button>
          <button class="btn btn-secondary" id="btn-records">查看榜单</button>
          <button class="btn" id="btn-back-menu">返回菜单</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
